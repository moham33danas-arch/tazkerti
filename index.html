<!DOCTYPE html>
<html dir="rtl" lang="ar" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>لوحة تحكم تزكرتي - المشرف</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { royal: '#1E3A8A', royalDark: '#0F172A', gold: '#C6A44C', emerald: '#059669' }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  
  <style>
    body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
    .dark body { background-color: #0B1121; color: #e2e8f0; }
    .dark .bg-white { background-color: #1E293B !important; }
    .dark .bg-gray-50 { background-color: #1E293B !important; }
    .dark .border-gray-200 { border-color: #334155 !important; }
    
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-card {
      background: white;
      border-radius: 2rem;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.5rem;
    }
    .dark .modal-card { background: #1E293B; }
    
    @media (max-width: 640px) {
      .modal-card { padding: 1rem; border-radius: 1.5rem; }
      table { font-size: 0.75rem; }
      td, th { padding: 0.5rem !important; }
    }
    
    .action-btn:active { transform: scale(0.95); }
    
    .city-chip {
      background: #e2e8f0;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .dark .city-chip { background: #334155; }
    
    /* زر إضافة منطقة بجانب القائمة */
    .add-city-btn {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1E3A8A;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      font-size: 1.2rem;
    }
    .dark .add-city-btn { background: #334155; border-color: #475569; color: #C6A44C; }
    .add-city-btn:hover { background: #C6A44C; color: white; border-color: #C6A44C; }
    
    /* معاينة الصورة */
    .image-preview {
      width: 100%;
      height: 120px;
      border-radius: 16px;
      background-size: cover;
      background-position: center;
      background-color: #f1f5f9;
      border: 1px dashed #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      margin-top: 8px;
    }
    .dark .image-preview { background-color: #1e293b; border-color: #475569; }
  </style>
</head>
<body class="text-gray-800 pb-6">

  <!-- شريط علوي -->
  <header class="bg-royal text-white sticky top-0 z-40 shadow-xl rounded-b-[2rem] px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <i class="fas fa-cog text-gold text-2xl"></i>
      <h1 class="text-2xl font-extrabold">لوحة التحكم</h1>
    </div>
    <div class="flex gap-2">
      <button id="themeToggle" class="bg-gold/20 p-2 rounded-full border border-gold/30">
        <i id="themeIcon" class="fas fa-moon"></i>
      </button>
      <a href="./" class="bg-white/10 p-2 rounded-full border border-white/20">
        <i class="fas fa-home"></i>
      </a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <!-- عنوان الصفحة وزر الإضافة -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-6">
      <h2 class="text-xl font-black text-royalDark dark:text-white">
        <i class="fas fa-bus ml-2 text-gold"></i>إدارة الرحلات والمناطق
      </h2>
      <button onclick="openBusModal()" class="bg-royalDark text-white px-6 py-3 rounded-2xl font-bold text-sm shadow-lg action-btn w-full sm:w-auto">
        <i class="fas fa-plus ml-1"></i> إضافة رحلة جديدة
      </button>
    </div>

    <!-- فلتر سريع -->
    <div class="flex flex-wrap gap-3 mb-5 bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700">
      <select id="filter-bus-from" onchange="loadBuses()" class="bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl p-3 text-sm flex-1 min-w-[140px]">
        <option value="">كل مناطق المغادرة</option>
      </select>
      <select id="filter-bus-to" onchange="loadBuses()" class="bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl p-3 text-sm flex-1 min-w-[140px]">
        <option value="">كل مناطق الوصول</option>
      </select>
      <button onclick="loadBuses()" class="bg-gold/20 text-gold px-5 py-3 rounded-xl font-bold text-sm">
        <i class="fas fa-filter ml-1"></i> تطبيق
      </button>
    </div>

    <!-- جدول الرحلات -->
    <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden mb-6">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 dark:bg-gray-700/50 border-b border-gray-200 dark:border-gray-700">
            <tr>
              <th class="px-4 py-3 text-right">الباص</th>
              <th class="px-4 py-3 text-right">من</th>
              <th class="px-4 py-3 text-right">إلى</th>
              <th class="px-4 py-3 text-right">الوقت</th>
              <th class="px-4 py-3 text-right">السعر</th>
              <th class="px-4 py-3 text-center">إجراءات</th>
            </tr>
          </thead>
          <tbody id="buses-table-body">
            <tr><td colspan="6" class="text-center py-10 text-gray-400"><i class="fas fa-spinner fa-pulse"></i> جاري التحميل...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- قسم المناطق (إدارة سريعة) -->
    <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-sm border border-gray-200 dark:border-gray-700 p-5">
      <div class="flex justify-between items-center mb-4">
        <h3 class="font-black text-lg text-royalDark dark:text-white">
          <i class="fas fa-map-marker-alt ml-2 text-gold"></i>المناطق المتاحة
        </h3>
        <span class="text-xs text-gray-400">يمكنك تعديل أو حذف أي منطقة (ستتحدث الرحلات تلقائياً)</span>
      </div>
      <div id="cities-list-container" class="flex flex-wrap gap-3">
        <div class="text-gray-400"><i class="fas fa-spinner fa-pulse"></i> جاري تحميل المناطق...</div>
      </div>
    </div>
  </main>

  <!-- Modal: إضافة/تعديل رحلة -->
  <div id="busModal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
      <div class="flex justify-between items-center mb-5">
        <h3 class="text-xl font-black text-royalDark dark:text-white" id="busModalTitle">إضافة رحلة جديدة</h3>
        <button onclick="closeBusModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
      </div>
      <form id="busForm" onsubmit="saveBus(event)">
        <input type="hidden" id="busId">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="col-span-2">
            <label class="block text-sm font-bold mb-1">اسم الباص</label>
            <input type="text" id="busName" class="w-full bg-gray-50 dark:bg-gray-700 border rounded-xl p-3" required placeholder="مثال: أبو عامر">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">النوع</label>
            <input type="text" id="busType" class="w-full bg-gray-50 dark:bg-gray-700 border rounded-xl p-3" placeholder="VIP / عادي">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">السعر (ج.س)</label>
            <input type="number" id="busPrice" class="w-full bg-gray-50 dark:bg-gray-700 border rounded-xl p-3" required>
          </div>
          
          <!-- حقل محطة المغادرة مع زر إضافة -->
          <div>
            <label class="block text-sm font-bold mb-1">محطة المغادرة</label>
            <div class="flex gap-2">
              <select id="busFrom" class="flex-1 bg-gray-50 dark:bg-gray-700 border rounded-xl p-3 appearance-none" required></select>
              <button type="button" onclick="openQuickCityModal('from')" class="add-city-btn" title="إضافة منطقة جديدة">
                <i class="fas fa-plus"></i>
              </button>
            </div>
          </div>
          
          <!-- حقل محطة الوصول مع زر إضافة -->
          <div>
            <label class="block text-sm font-bold mb-1">محطة الوصول</label>
            <div class="flex gap-2">
              <select id="busTo" class="flex-1 bg-gray-50 dark:bg-gray-700 border rounded-xl p-3 appearance-none" required></select>
              <button type="button" onclick="openQuickCityModal('to')" class="add-city-btn" title="إضافة منطقة جديدة">
                <i class="fas fa-plus"></i>
              </button>
            </div>
          </div>
          
          <div>
            <label class="block text-sm font-bold mb-1">وقت المغادرة</label>
            <input type="text" id="busDepTime" class="w-full bg-gray-50 dark:bg-gray-700 border rounded-xl p-3" placeholder="08:00 ص" required>
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">وقت الوصول</label>
            <input type="text" id="busArrTime" class="w-full bg-gray-50 dark:bg-gray-700 border rounded-xl p-3" placeholder="12:00 م" required>
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-bold mb-1">رابط الصورة</label>
            <input type="url" id="busImg" class="w-full bg-gray-50 dark:bg-gray-700 border rounded-xl p-3" placeholder="https://..." oninput="updateImagePreview()">
            <div id="imagePreview" class="image-preview">
              <i class="fas fa-image text-2xl"></i>
            </div>
          </div>
        </div>
        <div class="flex gap-3 mt-6">
          <button type="button" onclick="closeBusModal()" class="flex-1 bg-gray-100 dark:bg-gray-700 py-3 rounded-xl font-bold">إلغاء</button>
          <button type="submit" class="flex-1 bg-royalDark text-white py-3 rounded-xl font-bold">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: إضافة منطقة سريعة -->
  <div id="quickCityModal" class="modal-overlay" style="display: none;">
    <div class="modal-card" style="max-width: 400px;">
      <div class="flex justify-between items-center mb-5">
        <h3 class="text-xl font-black text-royalDark dark:text-white">إضافة منطقة جديدة</h3>
        <button onclick="closeQuickCityModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
      </div>
      <form id="quickCityForm" onsubmit="saveQuickCity(event)">
        <div class="mb-4">
          <label class="block text-sm font-bold mb-2">اسم المنطقة الظاهر</label>
          <input type="text" id="quickCityDisplayName" class="w-full bg-gray-50 dark:bg-gray-700 border rounded-xl p-3" required placeholder="مثال: الخرطوم">
        </div>
        <div class="mb-5">
          <label class="block text-sm font-bold mb-2">الاسم الكامل (للاستخدام الداخلي)</label>
          <input type="text" id="quickCityFullName" class="w-full bg-gray-50 dark:bg-gray-700 border rounded-xl p-3" required placeholder="مثال: الخرطوم (الخرطوم)">
          <p class="text-xs text-gray-400 mt-1">يُفضل كتابته بصيغة "المدينة (الولاية)"</p>
        </div>
        <div class="flex gap-3">
          <button type="button" onclick="closeQuickCityModal()" class="flex-1 bg-gray-100 dark:bg-gray-700 py-3 rounded-xl font-bold">إلغاء</button>
          <button type="submit" class="flex-1 bg-royalDark text-white py-3 rounded-xl font-bold">إضافة</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: تعديل منطقة (من القائمة) -->
  <div id="cityModal" class="modal-overlay" style="display: none;">
    <div class="modal-card" style="max-width: 400px;">
      <div class="flex justify-between items-center mb-5">
        <h3 class="text-xl font-black text-royalDark dark:text-white">تعديل المنطقة</h3>
        <button onclick="closeCityModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
      </div>
      <form id="cityForm" onsubmit="saveCity(event)">
        <input type="hidden" id="cityId">
        <div class="mb-4">
          <label class="block text-sm font-bold mb-2">اسم المنطقة الظاهر</label>
          <input type="text" id="cityDisplayName" class="w-full bg-gray-50 dark:bg-gray-700 border rounded-xl p-3" required>
        </div>
        <div class="mb-5">
          <label class="block text-sm font-bold mb-2">الاسم الكامل</label>
          <input type="text" id="cityFullName" class="w-full bg-gray-50 dark:bg-gray-700 border rounded-xl p-3" required>
        </div>
        <div class="flex gap-3">
          <button type="button" onclick="closeCityModal()" class="flex-1 bg-gray-100 dark:bg-gray-700 py-3 rounded-xl font-bold">إلغاء</button>
          <button type="submit" class="flex-1 bg-royalDark text-white py-3 rounded-xl font-bold">حفظ التعديلات</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // إعدادات Firebase
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCqhawEguWOGyIOPjMdeSLcc454VKxZIpo",
  authDomain: "buses-2e2d0.firebaseapp.com",
  projectId: "buses-2e2d0",
  storageBucket: "buses-2e2d0.firebasestorage.app",
  messagingSenderId: "379904295972",
  appId: "1:379904295972:web:b84e9a9c9aab853469c4b1",
  measurementId: "G-Z0XJ4TPPBT"
};
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let citiesList = [];
    let allBuses = [];
    let quickCityTarget = 'from'; // 'from' أو 'to'
    
    // ========== الوضع الداكن ==========
    function initTheme() {
      const html = document.documentElement;
      const icon = document.getElementById('themeIcon');
      const saved = localStorage.getItem('theme') || 'light';
      if (saved === 'dark') {
        html.classList.add('dark');
        icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
      }
      document.getElementById('themeToggle').addEventListener('click', () => {
        if (html.classList.contains('dark')) {
          html.classList.remove('dark');
          icon.classList.remove('fa-sun'); icon.classList.add('fa-moon');
          localStorage.setItem('theme', 'light');
        } else {
          html.classList.add('dark');
          icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
          localStorage.setItem('theme', 'dark');
        }
      });
    }
    
    function extractCity(full) {
      if (!full) return '';
      const match = full.match(/\(([^)]+)\)/);
      return match ? match[1] : full;
    }
    
    // ========== معاينة الصورة ==========
    function updateImagePreview() {
      const url = document.getElementById('busImg').value.trim();
      const preview = document.getElementById('imagePreview');
      if (url) {
        preview.style.backgroundImage = `url('${url}')`;
        preview.innerHTML = '';
      } else {
        preview.style.backgroundImage = '';
        preview.innerHTML = '<i class="fas fa-image text-2xl"></i>';
      }
    }
    
    // ========== تحميل المناطق ==========
    async function loadCities() {
      try {
        const snapshot = await db.collection("cities").orderBy("fullName").get();
        citiesList = [];
        snapshot.forEach(doc => citiesList.push({ id: doc.id, ...doc.data() }));
        renderCitiesList();
        populateCitySelects();
        if (citiesList.length === 0) await seedDefaultCities();
      } catch (err) {
        console.error("خطأ في تحميل المناطق:", err);
      }
    }
    
    async function seedDefaultCities() {
      const defaults = [
        { displayName: 'الخرطوم', fullName: 'الخرطوم (الخرطوم)' },
        { displayName: 'أم درمان', fullName: 'أم درمان (الخرطوم)' },
        { displayName: 'بحري', fullName: 'بحري (الخرطوم)' },
        { displayName: 'مدني', fullName: 'مدني (الجزيرة)' }
      ];
      const batch = db.batch();
      defaults.forEach(c => batch.set(db.collection("cities").doc(), c));
      await batch.commit();
      await loadCities();
    }
    
    function renderCitiesList() {
      const container = document.getElementById('cities-list-container');
      if (citiesList.length === 0) {
        container.innerHTML = '<div class="text-gray-400">لا توجد مناطق بعد</div>';
        return;
      }
      let html = '';
      citiesList.forEach(city => {
        html += `<div class="city-chip">
          <span>${city.displayName} (${city.fullName})</span>
          <button onclick="editCity('${city.id}')" class="text-blue-600 dark:text-blue-400"><i class="fas fa-edit"></i></button>
          <button onclick="deleteCity('${city.id}')" class="text-red-500"><i class="fas fa-trash"></i></button>
        </div>`;
      });
      container.innerHTML = html;
    }
    
    function populateCitySelects() {
      const selects = ['filter-bus-from', 'filter-bus-to', 'busFrom', 'busTo'];
      selects.forEach(id => {
        const sel = document.getElementById(id);
        if (sel) {
          const currentValue = sel.value;
          let options = '<option value="">اختر</option>';
          citiesList.forEach(c => options += `<option value="${c.fullName}">${c.displayName}</option>`);
          sel.innerHTML = options;
          if (currentValue) sel.value = currentValue;
        }
      });
    }
    
    // ========== نافذة إضافة منطقة سريعة ==========
    function openQuickCityModal(target) {
      quickCityTarget = target;
      document.getElementById('quickCityDisplayName').value = '';
      document.getElementById('quickCityFullName').value = '';
      document.getElementById('quickCityModal').style.display = 'flex';
    }
    
    function closeQuickCityModal() {
      document.getElementById('quickCityModal').style.display = 'none';
    }
    
    async function saveQuickCity(e) {
      e.preventDefault();
      const displayName = document.getElementById('quickCityDisplayName').value.trim();
      const fullName = document.getElementById('quickCityFullName').value.trim();
      if (!displayName || !fullName) return alert('جميع الحقول مطلوبة');
      
      try {
        // التأكد من عدم وجود منطقة بنفس الاسم الكامل
        const exists = citiesList.some(c => c.fullName === fullName);
        if (exists) {
          alert('هذه المنطقة موجودة بالفعل');
          return;
        }
        
        await db.collection("cities").add({ displayName, fullName });
        await loadCities();
        
        // تحديد المنطقة الجديدة في القائمة المناسبة
        const selectEl = document.getElementById(quickCityTarget === 'from' ? 'busFrom' : 'busTo');
        if (selectEl) selectEl.value = fullName;
        
        closeQuickCityModal();
      } catch (err) {
        alert('خطأ: ' + err.message);
      }
    }
    
    // ========== تعديل/حذف منطقة من القائمة ==========
    function editCity(cityId) {
      const city = citiesList.find(c => c.id === cityId);
      if (!city) return;
      document.getElementById('cityId').value = city.id;
      document.getElementById('cityDisplayName').value = city.displayName;
      document.getElementById('cityFullName').value = city.fullName;
      document.getElementById('cityModal').style.display = 'flex';
    }
    
    function closeCityModal() {
      document.getElementById('cityModal').style.display = 'none';
    }
    
    async function saveCity(e) {
      e.preventDefault();
      const id = document.getElementById('cityId').value;
      const displayName = document.getElementById('cityDisplayName').value.trim();
      const fullName = document.getElementById('cityFullName').value.trim();
      if (!displayName || !fullName) return alert('جميع الحقول مطلوبة');
      
      const oldCity = citiesList.find(c => c.id === id);
      try {
        if (id) {
          await db.collection("cities").doc(id).update({ displayName, fullName });
          if (oldCity && oldCity.fullName !== fullName) {
            const batch = db.batch();
            const fromSnap = await db.collection("buses").where("from", "==", oldCity.fullName).get();
            fromSnap.forEach(doc => batch.update(doc.ref, { from: fullName }));
            const toSnap = await db.collection("buses").where("to", "==", oldCity.fullName).get();
            toSnap.forEach(doc => batch.update(doc.ref, { to: fullName }));
            await batch.commit();
          }
        }
        closeCityModal();
        await loadCities();
        loadBuses();
      } catch (err) {
        alert('خطأ: ' + err.message);
      }
    }
    
    async function deleteCity(cityId) {
      const city = citiesList.find(c => c.id === cityId);
      if (!city) return;
      if (!confirm(`حذف المنطقة "${city.displayName}"؟ سيتم حذف جميع الرحلات المرتبطة بها!`)) return;
      try {
        const batch = db.batch();
        const fromSnap = await db.collection("buses").where("from", "==", city.fullName).get();
        fromSnap.forEach(doc => batch.delete(doc.ref));
        const toSnap = await db.collection("buses").where("to", "==", city.fullName).get();
        toSnap.forEach(doc => batch.delete(doc.ref));
        batch.delete(db.collection("cities").doc(cityId));
        await batch.commit();
        await loadCities();
        loadBuses();
      } catch (err) {
        alert('خطأ: ' + err.message);
      }
    }
    
    // ========== تحميل الرحلات ==========
    async function loadBuses() {
      const tbody = document.getElementById('buses-table-body');
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10"><i class="fas fa-spinner fa-pulse"></i> جاري التحميل...</td></tr>';
      
      const fromFilter = document.getElementById('filter-bus-from')?.value || '';
      const toFilter = document.getElementById('filter-bus-to')?.value || '';
      
      try {
        let query = db.collection("buses");
        if (fromFilter) query = query.where("from", "==", fromFilter);
        if (toFilter) query = query.where("to", "==", toFilter);
        
        const snapshot = await query.get();
        allBuses = [];
        snapshot.forEach(doc => allBuses.push({ id: doc.id, ...doc.data() }));
        
        if (allBuses.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-gray-400">لا توجد رحلات</td></tr>';
          return;
        }
        
        let html = '';
        allBuses.forEach(bus => {
          html += `<tr class="border-b border-gray-100 dark:border-gray-700">
            <td class="px-4 py-3 font-bold">${bus.name || ''}</td>
            <td class="px-4 py-3">${extractCity(bus.from)}</td>
            <td class="px-4 py-3">${extractCity(bus.to)}</td>
            <td class="px-4 py-3">${bus.depTime || ''} - ${bus.arrTime || ''}</td>
            <td class="px-4 py-3">${bus.price || ''} ج.س</td>
            <td class="px-4 py-3 text-center">
              <button onclick="editBus('${bus.id}')" class="text-blue-600 dark:text-blue-400 mx-1"><i class="fas fa-edit"></i></button>
              <button onclick="deleteBus('${bus.id}')" class="text-red-500 mx-1"><i class="fas fa-trash"></i></button>
            </td>
          </tr>`;
        });
        tbody.innerHTML = html;
      } catch (err) {
        console.error(err);
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-red-500">خطأ في التحميل</td></tr>';
      }
    }
    
    // ========== إضافة/تعديل رحلة ==========
    function openBusModal(busData = null) {
      populateCitySelects();
      
      if (busData) {
        document.getElementById('busModalTitle').innerText = 'تعديل رحلة';
        document.getElementById('busId').value = busData.id;
        document.getElementById('busName').value = busData.name || '';
        document.getElementById('busType').value = busData.type || '';
        document.getElementById('busPrice').value = busData.price || '';
        document.getElementById('busFrom').value = busData.from || '';
        document.getElementById('busTo').value = busData.to || '';
        document.getElementById('busDepTime').value = busData.depTime || '';
        document.getElementById('busArrTime').value = busData.arrTime || '';
        document.getElementById('busImg').value = busData.img || '';
      } else {
        document.getElementById('busModalTitle').innerText = 'إضافة رحلة جديدة';
        document.getElementById('busId').value = '';
        document.getElementById('busForm').reset();
      }
      updateImagePreview();
      document.getElementById('busModal').style.display = 'flex';
    }
    
    function closeBusModal() {
      document.getElementById('busModal').style.display = 'none';
    }
    
    async function saveBus(e) {
      e.preventDefault();
      const id = document.getElementById('busId').value;
      const fromValue = document.getElementById('busFrom').value;
      const toValue = document.getElementById('busTo').value;
      
      if (!fromValue || !toValue) {
        alert('الرجاء اختيار محطتي المغادرة والوصول');
        return;
      }
      
      const data = {
        name: document.getElementById('busName').value.trim(),
        type: document.getElementById('busType').value.trim(),
        price: Number(document.getElementById('busPrice').value),
        from: fromValue,
        to: toValue,
        depTime: document.getElementById('busDepTime').value.trim(),
        arrTime: document.getElementById('busArrTime').value.trim(),
        img: document.getElementById('busImg').value.trim() || 'https://images.pexels.com/photos/2790386/pexels-photo-2790386.jpeg?auto=compress&cs=tinysrgb&w=600'
      };
      
      if (!data.name || !data.price) {
        alert('الرجاء ملء اسم الباص والسعر'); return;
      }
      
      try {
        if (id) {
          await db.collection("buses").doc(id).update(data);
        } else {
          await db.collection("buses").add(data);
        }
        closeBusModal();
        loadBuses();
        loadCities();
      } catch (err) {
        alert('خطأ في الحفظ: ' + err.message);
      }
    }
    
    function editBus(busId) {
      const bus = allBuses.find(b => b.id === busId);
      if (bus) openBusModal(bus);
    }
    
    async function deleteBus(busId) {
      if (!confirm('حذف هذه الرحلة؟')) return;
      try {
        await db.collection("buses").doc(busId).delete();
        loadBuses();
      } catch (err) {
        alert('خطأ: ' + err.message);
      }
    }
    
    // ========== تهيئة الصفحة ==========
    window.onload = async () => {
      initTheme();
      await loadCities();
      loadBuses();
    };
    
    // تعريض الدوال
    window.openBusModal = openBusModal;
    window.closeBusModal = closeBusModal;
    window.saveBus = saveBus;
    window.editBus = editBus;
    window.deleteBus = deleteBus;
    window.loadBuses = loadBuses;
    window.editCity = editCity;
    window.deleteCity = deleteCity;
    window.closeCityModal = closeCityModal;
    window.saveCity = saveCity;
    window.openQuickCityModal = openQuickCityModal;
    window.closeQuickCityModal = closeQuickCityModal;
    window.saveQuickCity = saveQuickCity;
    window.updateImagePreview = updateImagePreview;
  </script>
</body>
</html>
